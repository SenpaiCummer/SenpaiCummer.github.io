<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Terms of Use</title>
    <style>
        /* Simple CSS for the overlay */
        .overlay {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
            padding-top: 60px;
            text-align: center;
        }
        .overlay-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
        }
        #acceptBtn {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        /* CSS for the header with buttons */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f0f0f0;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000; /* Ensure it's above other content */
        }
        .header .logo {
            font-size: 20px;
        }
        .header .buttons {
            display: flex;
            align-items: center;
        }
        .header .buttons .btn {
            margin-left: 10px;
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        /* CSS for the login screen */
        .login-container {
            display: none;
            position: fixed;
            z-index: 2;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background-color: #fefefe;
            padding: 20px;
            border: 1px solid #888;
            width: 300px;
            text-align: center;
        }
        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: calc(100% - 20px);
            margin: 10px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .login-box button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Header with Home and Login buttons -->
<header class="header">
    <div class="logo">Home</div>
    <div class="buttons">
        <button class="btn">Login</button>
    </div>
</header>

<!-- Overlay with Terms of Use message -->
<div id="overlay" class="overlay">
    <div class="overlay-content">
        <p>By clicking accept, you agree to our <a href="#" id="termsLink">Terms of Use</a>.</p>
        <button id="acceptBtn">Accept</button>
    </div>
</div>

<!-- Login screen -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
    </div>
</div>

<!-- Your README.md content -->
<div id="readmeContent">
    <!-- Replace this with your actual README.md content -->
    <h1>The Official Minecraft Hacking Tool!</h1>
    <p>We will provide you with a professional Minecraft hacking tool.</p>
    <p>This project is in WIP.</p>
</div>

<script>
    // Get references to elements
    var overlay = document.getElementById("overlay");
    var loginScreen = document.getElementById("loginScreen");
    var acceptBtn = document.getElementById("acceptBtn");
    var termsLink = document.getElementById("termsLink");
    var readmeContent = document.getElementById("readmeContent");

    // When the user clicks the button, show the overlay
    acceptBtn.onclick = function() {
        overlay.style.display = "none"; // Hide the overlay
        loginScreen.style.display = "flex"; // Show the login screen
    }

    // Set the href attribute for Terms of Use link
    termsLink.href = "https://github.com/SenpaiCummer/SenpaiCummer.github.io/blob/main/TERMS%20OF%20USE";

    // Example login functionality (replace with actual logic)
    var loginBtn = document.getElementById("loginBtn");
    loginBtn.onclick = function() {
        alert("Login button clicked - Add your login logic here!");
    }
</script>

</body>
</html>
