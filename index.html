<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Terms of Use</title>
    <style>
        /* Simple CSS for the modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Welcome to Our Project</h2>

<p>Before using this project, please make sure to read and accept our <a href="https://github.com/SenpaiCummer/SenpaiCummer.github.io/blob/main/TERMS%20OF%20USE" target="_blank">Terms of Use</a>.</p>

<!-- Trigger/Open The Modal -->
<button id="myBtn">Read and Accept Terms of Use</button>

<!-- The Modal -->
<div id="myModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <p>By clicking accept, you agree to our <a href="https://github.com/SenpaiCummer/SenpaiCummer.github.io/blob/main/TERMS%20OF%20USE" target="_blank">Terms of Use</a>.</p>
    <button id="acceptBtn">Accept</button>
  </div>
</div>

<script>
    // Get the modal
    var modal = document.getElementById("myModal");

    // Get the button that opens the modal
    var btn = document.getElementById("myBtn");

    // Get the <span> element that closes the modal
    var span = document.getElementsByClassName("close")[0];

    // Get the accept button
    var acceptBtn = document.getElementById("acceptBtn");

    // When the user clicks the button, open the modal 
    btn.onclick = function() {
        modal.style.display = "block";
    }

    // When the user clicks on <span> (x), close the modal
    span.onclick = function() {
        modal.style.display = "none";
    }

    // When the user clicks the accept button, close the modal
    acceptBtn.onclick = function() {
        modal.style.display = "none";
        alert("Thank you for accepting the terms of use!");
    }

    // When the user clicks anywhere outside of the modal, close it
    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
